# 文件说明：
# 本文件为 Clash / Mihomo 通用配置文件，主要用于以下 4 个使用场景：
# 1. 采用 Mihomo 内核路由器的 OpenClash
# 2. Windows 11 桌面端 Clash Mi 应用
